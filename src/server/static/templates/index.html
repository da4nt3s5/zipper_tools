<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>zipper_tools</title>
  <link rel="stylesheet" href="/static/css/style.css?v=2" />
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
</head>
<body>

  <!-- Terminal background -->
  <canvas id="zbg"></canvas>

  <!-- Dark overlay -->
  <div class="overlay"></div>

  <!-- ══════════════════════════════════════
       LAYER 1 — Modal (visible on load)
  ══════════════════════════════════════ -->
  <div id="layerModal" class="layer on">
    <div class="modal">

      <!-- Tabs -->
      <div class="tab-row">
        <span class="tp active" data-t="file">FILE</span>
        <span class="tp" data-t="url">URL</span>
        <span class="tp" data-t="search">SEARCH</span>
        <span class="tp tlogin" data-t="login">LOGIN</span>
      </div>

      <!-- FILE -->
      <div id="tc-file" class="tc active-tc">
        <div class="card">
          <svg class="upload-icon" width="38" height="38" viewBox="0 0 40 40" fill="none">
            <rect x="5" y="5" width="30" height="30" rx="5" stroke="#1e2e5a" stroke-width="1"/>
            <path d="M20 27L20 13M14 19L20 13L26 19" stroke="#3d5a9a" stroke-width="1.3"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <p class="drop-label">
            drag & drop  or  <span class="browse-link">browse files</span>
          </p>
          <p class="ext-label">.exe  ·  .apk  ·  .dll  ·  .pdf</p>
          <input type="file" id="fileInput" accept=".exe,.apk,.dll,.pdf" hidden />
        </div>
        <p class="legal">
          By submitting you agree to our
          <a href="#">Terms</a> · <a href="#">Privacy</a>
        </p>
      </div>

      <!-- URL -->
      <div id="tc-url" class="tc">
        <div class="card card-form">
          <div class="field-row">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M1 6h10M8 2l4 4-4 4" stroke="#2a4278" stroke-width="1"
                    stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            </svg>
            <input id="urlInput" type="url" placeholder="https://evil.example.com" />
          </div>
          <button id="submitUrl" class="cbtn">Submit URL</button>
        </div>
        <p class="legal">
          By submitting you agree to our
          <a href="#">Terms</a> · <a href="#">Privacy</a>
        </p>
      </div>

      <!-- SEARCH -->
      <div id="tc-search" class="tc">
        <div class="card card-form">
          <div class="field-row">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <circle cx="5" cy="5" r="3.5" stroke="#2a4278" stroke-width="1"/>
              <line x1="7.5" y1="7.5" x2="11" y2="11" stroke="#2a4278"
                    stroke-width="1" stroke-linecap="round"/>
            </svg>
            <input id="searchInput" type="text" placeholder="SHA256, MD5, domain, IP, IOC…" />
          </div>
          <button id="submitSearch" class="cbtn">Search indicators</button>
        </div>
      </div>

      <!-- LOGIN -->
      <div id="tc-login" class="tc">
        <div class="card card-form card-login">
          <div class="field-row field-login">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <circle cx="6" cy="4" r="2" stroke="#4a2a7a" stroke-width="1"/>
              <path d="M1.5 11c0-2.5 2-4.5 4.5-4.5s4.5 2 4.5 4.5"
                    stroke="#4a2a7a" stroke-width="1" stroke-linecap="round" fill="none"/>
            </svg>
            <input type="email" placeholder="user@zipper_tools.io" />
          </div>
          <div class="field-row field-login">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <rect x="2" y="5.5" width="8" height="5.5" rx="1" stroke="#4a2a7a" stroke-width="1"/>
              <path d="M4 5.5V4a2 2 0 114 0v1.5" stroke="#4a2a7a" stroke-width="1" fill="none"/>
            </svg>
            <input type="password" placeholder="password" />
          </div>
          <button class="pbtn" id="signinBtn">Sign in</button>
          <div class="login-links">
            <span class="lnk">Forgot password?</span>
            <span class="sep">·</span>
            <span class="lnk">Create account</span>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- ══════════════════════════════════════
       LAYER 2 — Terminal + Navbar (post-submit)
  ══════════════════════════════════════ -->
  <div id="layerTerminal" class="layer">

    <!-- Navbar -->
    <nav class="navbar">
      <svg class="nav-icon" width="26" height="26" viewBox="0 0 72 72" fill="none">
        <rect width="72" height="72" rx="16" fill="#0e1020"/>
        <path d="M18 18 L10 18 L10 54 L18 54" stroke="#2a4270" stroke-width="1.5"
              stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <path d="M54 18 L62 18 L62 54 L54 54" stroke="#2a4270" stroke-width="1.5"
              stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <text x="27" y="44" text-anchor="middle" font-family="monospace"
              font-size="22" font-weight="700" fill="#7aa2f7">Z</text>
        <text x="46" y="44" text-anchor="middle" font-family="monospace"
              font-size="22" font-weight="700" fill="#7aa2f7">T</text>
      </svg>
      <span class="nav-name">zipper_tools</span>
      <div class="nav-divider"></div>
      <button id="btnNewSubmit" class="nav-btn">+ new submit</button>
      <button id="btnNavLogin" class="nav-btn nav-btn-login">login</button>
    </nav>

    <!-- Terminal output -->
    <canvas id="termCanvas"></canvas>

  </div>

  <script src="/static/js/app.js?v=2"></script>
</body>
</html>
